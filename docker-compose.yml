version: "3.9"

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: production
    container_name: sms-server
    restart: unless-stopped
    env_file: ./server/.env
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - sms-net

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:3001}
    container_name: sms-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - sms-net

networks:
  sms-net:
    driver: bridge
