name: Student Management System App to AWS EKS CI/CD Pipeline

on:
    workflow_dispatch:

jobs:
    server-build-test:
        runs-on: ubuntu-latest
    
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            
            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                    node-version: '25'

            - name: Install dependencies
              working-directory: server
              run: npm ci
            
            - name: Run tests (If any)
              working-directory: server
              run: npm test --if-present
    
    server-docker-build-push:
        runs-on: ubuntu-latest
        needs: server-build-test

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            
            - name: Login to DockerHub
              uses: docker/login-action@v4
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}
            
            - name: Build and push Docker Image
              uses: docker/build-push-action@v7
              with:
                context: ./server
                push: true
                tags: ${{ secrets.DOCKER_USERNAME }}/student-management-backend:latest
    
    server-deploy-to-eks:
        runs-on: ubuntu-latest
        needs: server-docker-build-push

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            
            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v6.1.0
              with:
                aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                aws-region: ap-south-1
            
            - name: Setup kubectl
              uses: azure/setup-kubectl@v4
            
            - name: Update kubeconfig for EKS
              run: |
                  aws eks update-kubeconfig --name student-server --region ap-south-1
            
            - name: Verify connection
              run: kubectl get nodes
            
            - name: Create/Update Kubernetes Secret
              env:
                CLIENT_URL: ${{ secrets.CLIENT_URL }}
                NODE_ENV: ${{ secrets.NODE_ENV }}
                JWT_SECRET: ${{ secrets.JWT_SECRET }}
                MONGO_URI: ${{ secrets.MONGO_URI }}
              run: |
                kubectl create secret generic env-secrets \
                  --from-literal=CLIENT_URL="${CLIENT_URL}" \
                  --from-literal=NODE_ENV="${NODE_ENV}" \
                  --from-literal=JWT_SECRET="${JWT_SECRET}" \
                  --from-literal=MONGO_URI="${MONGO_URI}" \
                  --dry-run=client -o yaml | kubectl apply -f -

            - name: Deploy to AWS (Kubernetes)
              run: kubectl apply -f k8s/server/deployement.yaml
    
    client-build-test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "25"

            - name: Install dependencies
              working-directory: ./client
              run: npm ci

            - name: Build frontend
              working-directory: ./client
              run: npm run build

            - name: Run lint (if exists)
              working-directory: ./client
              run: npm run lint --if-present

    client-docker-build-push:
        runs-on: ubuntu-latest
        needs: client-build-test

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Log in to Docker Hub
              uses: docker/login-action@v4
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Build and push Docker image
              uses: docker/build-push-action@v7
              with:
                  context: ./client
                  push: true
                  tags: |
                      ${{ secrets.DOCKER_USERNAME }}/student-management-frontend:latest
                  build-args: |
                      VITE_BACKEND_URL=${{ secrets.VITE_BACKEND_URL }}
            - name: Debug secret
              run: |
                if [ -z "${{ secrets.VITE_BACKEND_URL }}" ]; then
                  echo "VITE_BACKEND_URL is EMPTY"
                  exit 1
                else
                  echo "VITE_BACKEND_URL exists"
                fi
    
    client-deploy-to-eks:
        runs-on: ubuntu-latest
        needs: client-docker-build-push

        steps:
            - name: Checkout code
              uses: actions/checkout@v6
            
            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v6.1.0
              with:
                aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                aws-region: ap-south-1
            
            - name: Setup kubectl
              uses: azure/setup-kubectl@v4
            
            - name: Update kubeconfig for EKS
              run: |
                  aws eks update-kubeconfig --name student-client --region ap-south-1

            - name: Verify connection
              run: kubectl get nodes

            - name: Deploy to AWS (Kubernetes)
              run: kubectl apply -f k8s/client/deployment.yaml