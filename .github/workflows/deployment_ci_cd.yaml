name: Full Deploy — Build, Push & Deploy to AWS EKS

on:
    workflow_dispatch:

jobs:
    # ── Server ──────────────────────────────────────────────────────────────────
    server-build-test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: "npm"
                  cache-dependency-path: server/package-lock.json

            - name: Install dependencies
              working-directory: server
              run: npm ci

            - name: Lint
              working-directory: server
              run: npm run lint

            - name: Tests
              working-directory: server
              run: npm test --if-present

    server-docker-build-push:
        runs-on: ubuntu-latest
        needs: server-build-test
        steps:
            - uses: actions/checkout@v4

            - uses: docker/setup-buildx-action@v3

            - uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            - uses: docker/build-push-action@v6
              with:
                  context: ./server
                  push: true
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  tags: |
                      ${{ secrets.DOCKER_USERNAME }}/student-management-backend:latest
                      ${{ secrets.DOCKER_USERNAME }}/student-management-backend:${{ github.sha }}

    server-deploy-to-eks:
        runs-on: ubuntu-latest
        needs: server-docker-build-push
        steps:
            - uses: actions/checkout@v4

            - uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ap-south-1

            - uses: azure/setup-kubectl@v4

            - name: Update kubeconfig for EKS
              run: aws eks update-kubeconfig --name student-server --region ap-south-1

            - name: Verify cluster connection
              run: kubectl get nodes

            - name: Create/Update Kubernetes Secret
              run: |
                kubectl create secret generic env-secrets \
                  --from-literal=CLIENT_URL="${{ secrets.CLIENT_URL }}" \
                  --from-literal=NODE_ENV="${{ secrets.NODE_ENV }}" \
                  --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
                  --from-literal=MONGO_URI="${{ secrets.MONGO_URI }}" \
                  --from-literal=GEMINI_BASE_URL="${{ secrets.GEMINI_BASE_URL }}" \
                  --from-literal=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
                  --from-literal=GEMINI_MODEL="${{ secrets.GEMINI_MODEL }}" \
                  --dry-run=client -o yaml | kubectl apply -f -

            - name: Deploy server to EKS
              run: kubectl apply -f k8s/server/deployement.yaml

            - name: Wait for rollout
              run: kubectl rollout status deployment/student-server --timeout=120s

    # ── Client ──────────────────────────────────────────────────────────────────
    client-build-test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: "npm"
                  cache-dependency-path: client/package-lock.json

            - name: Install dependencies
              working-directory: ./client
              run: npm ci

            - name: Lint
              working-directory: ./client
              run: npm run lint

            - name: Build frontend
              working-directory: ./client
              run: npm run build
              env:
                  VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}

    client-docker-build-push:
        runs-on: ubuntu-latest
        needs: client-build-test
        steps:
            - uses: actions/checkout@v4

            - uses: docker/setup-buildx-action@v3

            - uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            - uses: docker/build-push-action@v6
              with:
                  context: ./client
                  push: true
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  tags: |
                      ${{ secrets.DOCKER_USERNAME }}/student-management-frontend:latest
                      ${{ secrets.DOCKER_USERNAME }}/student-management-frontend:${{ github.sha }}
                  build-args: |
                      VITE_BACKEND_URL=${{ secrets.VITE_BACKEND_URL }}

    client-deploy-to-eks:
        runs-on: ubuntu-latest
        needs: client-docker-build-push
        steps:
            - uses: actions/checkout@v4

            - uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ap-south-1

            - uses: azure/setup-kubectl@v4

            - name: Update kubeconfig for EKS
              run: aws eks update-kubeconfig --name student-client --region ap-south-1

            - name: Verify cluster connection
              run: kubectl get nodes

            - name: Deploy client to EKS
              run: kubectl apply -f k8s/client/deployment.yaml

            - name: Wait for rollout
              run: kubectl rollout status deployment/student-client --timeout=120s
