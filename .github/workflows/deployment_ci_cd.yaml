name: Student Management System App to AWS EKS CI/CD Pipeline

on:
    workflow_dispatch:

jobs:
    build-test:
        runs-on: ubuntu-latest
    
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            
            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                    node-version: '25'

            - name: Install dependencies
              working-directory: server
              run: npm ci
            
            - name: Run tests (If any)
              working-directory: server
              run: npm test --if-present
    
    docker-build-push:
        runs-on: ubuntu-latest
        needs: build-test

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            
            - name: Login to DockerHub
              uses: docker/login-action@v4
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}
            
            - name: Build and push Docker Image
              uses: docker/build-push-action@v7
              with:
                context: ./server
                push: true
                tags: ${{ secrets.DOCKER_USERNAME }}/student-management-backend:latest
    
    deploy-to-eks:
        runs-on: ubuntu-latest
        needs: docker-build-push

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            
            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v6.1.0
              with:
                aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                aws-region: ap-south-1
            
            - name: Setup kubectl
              uses: azure/setup-kubectl@v4
            
            - name: Update kubeconfig for EKS
              run: |
                  aws eks update-kubeconfig --name student-server --region ap-south-1
            
            - name: Verify connection
              run: kubectl get nodes
            
            - name: Generate Secret Manifest
              env: 
                  VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}
                  NODE_ENV: ${{ secrets.NODE_ENV }}
                  JWT_SECRET: ${{ secrets.JWT_SECRET }}
                  MONGO_URI: ${{ secrets.MONGO_URI }}
              run: |
                  envsubst < k8s/server/secret_env.yaml > k8s/secret-generated.yaml
            - name: Apply Secret
              run: kubectl apply -f k8s/secret-generated.yaml

            - name: Deploy to AWS (Kubernetes)
              run: kubectl apply -f k8s/server/deployement.yaml