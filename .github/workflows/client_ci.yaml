name: Frontend — Build, Lint & Docker Push

on:
    push:
        paths:
            - "client/**"
    workflow_dispatch:

jobs:
    build-test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: "npm"
                  cache-dependency-path: client/package-lock.json

            - name: Install dependencies
              working-directory: ./client
              run: npm ci

            - name: Run lint
              working-directory: ./client
              run: npm run lint

            - name: Build frontend
              working-directory: ./client
              run: npm run build
              env:
                  VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}

    docker-build-push:
        runs-on: ubuntu-latest
        needs: build-test

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Validate required secret
              run: |
                if [ -z "${{ secrets.VITE_BACKEND_URL }}" ]; then
                  echo "::error::VITE_BACKEND_URL secret is not set"
                  exit 1
                fi

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Build and push Docker image
              uses: docker/build-push-action@v6
              with:
                  context: ./client
                  push: true
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  tags: |
                      ${{ secrets.DOCKER_USERNAME }}/student-management-frontend:latest
                      ${{ secrets.DOCKER_USERNAME }}/student-management-frontend:${{ github.sha }}
                  build-args: |
                      VITE_BACKEND_URL=${{ secrets.VITE_BACKEND_URL }}
