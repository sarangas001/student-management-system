apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-server
  labels:
    app: student-server
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: student-server
  template:
    metadata:
      labels:
        app: student-server
    spec:
      containers:
      - name: student-server
        image: sarangasl/student-management-backend:latest
        imagePullPolicy: Always
        envFrom:
          - secretRef:
              name: env-secrets
        env:
        - name: PORT
          value: "3001"
        ports:
        - containerPort: 3001
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 3001
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 12
---
apiVersion: v1
kind: Service
metadata:
  name: student-server
spec:
  selector:
    app: student-server
  type: LoadBalancer
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3001
