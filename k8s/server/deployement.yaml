apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: student-server
  template:
    metadata:
      labels:
        app: student-server
    spec:
      containers:
      - name: student-server
        image: sarangasl/student-management-backend:latest
        envFrom:
          - secretRef:
              name: env-secrets
        env:
        - name: PORT
          value: "3001"
        ports:
        - containerPort: 3001
---
apiVersion: v1
kind: Service
metadata:
  name: student-server
spec:
  selector:
    app: student-server
  type: LoadBalancer
  ports:
     - protocol: TCP
       port: 80
       targetPort: 3001