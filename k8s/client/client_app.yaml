apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: student-frontend
  template:
    metadata:
      labels:
        app: student-frontend
    spec:
      containers:
      - name: student-frontend
        image: sarangasl/student-management-frontend:latest
        imagePullPolicy: Always
        env:
        - name: PORT
          value: "5173"
        ports:
        - containerPort: 5173
---
apiVersion: v1
kind: Service
metadata:
  name: student-frontend
spec:
  selector:
    app: student-frontend
  type: NodePort
  ports:
    -  port: 5173
       targetPort: 5173
       nodePort: 32000