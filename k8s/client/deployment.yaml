apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-client
  labels:
    app: student-client
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: student-client
  template:
    metadata:
      labels:
        app: student-client
    spec:
      containers:
      - name: student-client
        image: sarangasl/student-management-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: student-client
spec:
  selector:
    app: student-client
  type: LoadBalancer
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
