apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-client
spec:
  replicas: 2
  selector:
    matchLabels:
      app: student-client
  template:
    metadata:
      labels:
        app: student-client
    spec:
      containers:
      - name: student-client
        image: sarangasl/student-management-frontend:latest
        imagePullPolicy: Always
        env:
        - name: PORT
          value: "5173"
        ports:
        - containerPort: 5173
---
apiVersion: v1
kind: Service
metadata:
  name: student-client
spec:
  selector:
    app: student-client
  type: LoadBalancer
  ports:
     - protocol: TCP
       port: 80
       targetPort: 5173