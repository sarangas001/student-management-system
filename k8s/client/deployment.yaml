apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: student-client
  template:
    metadata:
      labels:
        app: student-client
    spec:
      containers:
      - name: student-client
        image: sarangasl/student-management-frontend:latest
        imagePullPolicy: Always
        env:
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: student-client
spec:
  selector:
    app: student-client
  type: LoadBalancer
  ports:
     - protocol: TCP
       port: 80
       targetPort: 80
